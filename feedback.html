    <div class="form">
        <h3>Give feedback</h3>
        <p id="p1">What do you think of Smartbuy?</p>

        <div class="emoji-group">
            <input type="radio" name="rating" id="sad-2" value="1"><label for="sad-2">😢</label>
            <input type="radio" name="rating" id="sad-1" value="2"><label for="sad-1">🙁</label>
            <input type="radio" name="rating" id="neutral" value="3"><label for="neutral">😐</label>
            <input type="radio" name="rating" id="happy-1" value="4" checked><label for="happy-1">😊</label>
            <input type="radio" name="rating" id="happy-2" value="5"><label for="happy-2">😁</label>
        </div>

        <div class="input-section">
            <label>Do you have any thoughts you'd like to share?</label>
            <textarea placeholder="There's..."></textarea>
        </div>

        <div class="actions">
            <button class="btn-send" onclick="alert('Thank you! Your feedback has been submitted successfully.')">Send Feedback</button>
        </div>
    </div>
